---
# https://launchpad.net/~git-core/+archive/ubuntu/ppa
- block:
    - name: install git signing key
      get_url:
        url: "http://keyserver.ubuntu.com/pks/lookup?op=get&search=0xe363c90f8f1b6217"
        dest: /usr/share/keyrings/git-archive-keyring.asc
        mode: 0644

    - name: add git repo
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/git-archive-keyring.asc] https://ppa.launchpadcontent.net/git-core/ppa/ubuntu {{ ansible_facts.lsb.codename }} main"
        filename: git
        state: present
        update_cache: yes

    - name: install git package
      apt:
        name: git
        state: latest
  tags: ['git']
