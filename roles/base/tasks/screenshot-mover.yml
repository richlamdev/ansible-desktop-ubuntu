---
# Run all tasks as regular user by default
- name: Screenshot monitor tasks
  become: false
  block:
    - name: Ensure uv is installed
      when: screenshot_monitor_ensure_uv | bool
      block:
        - name: Check if uv is installed
          command: "{{ home_dir }}/.local/bin/uv --version"
          register: _uv_installed
          failed_when: false
          changed_when: false

        - name: Remove uv if installed via pipx
          community.general.pipx:
            name: uv
            state: absent
          when:
            - _uv_installed.rc == 0
            - "'pipx' in lookup('pipe', 'readlink -f ' + home_dir + '/.local/bin/uv')"

        - name: Download uv installer
          get_url:
            url: https://astral.sh/uv/install.sh
            dest: /tmp/uv-install.sh
            mode: '0755'
          when: _uv_installed.rc != 0

        - name: Install uv
          command: /tmp/uv-install.sh
          when: _uv_installed.rc != 0

        - name: Update uv to latest
          command: "{{ home_dir }}/.local/bin/uv self update"
          register: _uv_update
          changed_when: "'Updated' in _uv_update.stdout"
          when: _uv_installed.rc == 0

    - name: Ensure directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ screenshot_monitor_install_dir }}"
        - "{{ screenshot_monitor_service_dir }}"
        - "{{ screenshot_monitor_source_dir }}"

    - name: Deploy screenshot monitor script
      copy:
        src: screenshot_monitor.py
        dest: "{{ screenshot_monitor_install_dir }}/screenshot_monitor.py"
        mode: '0755'
      notify: restart screenshot-monitor

    - name: Deploy systemd user service
      copy:
        dest: "{{ screenshot_monitor_service_dir }}/screenshot-monitor.service"
        mode: '0644'
        content: |
          [Unit]
          Description=Screenshot Transfer Monitor
          After=graphical-session.target

          [Service]
          Type=simple
          ExecStart={{ screenshot_monitor_install_dir }}/uv run {{ screenshot_monitor_install_dir }}/screenshot_monitor.py
          Restart=on-failure
          RestartSec=5
          Environment="PATH={{ home_dir }}/.local/bin:/usr/local/bin:/usr/bin:/bin"

          [Install]
          WantedBy=default.target
      notify:
        - reload systemd user daemon
        - restart screenshot-monitor

    - name: Check if systemd user bus is available
      command: systemctl --user status
      register: systemd_user_check
      changed_when: false
      failed_when: false
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ screenshot_monitor_user_uid }}"

    - name: Reload systemd user daemon
      systemd:
        daemon_reload: true
        scope: user
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ screenshot_monitor_user_uid }}"
      when: systemd_user_check.rc == 0

    - name: Enable and start screenshot monitor service
      systemd:
        name: screenshot-monitor
        enabled: true
        state: started
        scope: user
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ screenshot_monitor_user_uid }}"
      when: systemd_user_check.rc == 0

    - name: Notify user if systemd user service could not be started
      debug:
        msg: |
          WARNING: Could not connect to systemd user bus.
          The service file has been deployed but not started.
          After logging in graphically, run:
            systemctl --user daemon-reload
            systemctl --user enable --now screenshot-monitor
      when: systemd_user_check.rc != 0

    - name: Enable lingering for user (service starts at boot)
      command: loginctl enable-linger {{ local_user }}
      become: true
      changed_when: false
      failed_when: false
      when: screenshot_monitor_enable_lingering | bool
