---
- name: "Install/Update kubescape"
  block:
    # Check current installation
    - name: "Check if kubescape is installed"
      command: "{{ kubescape_install_path }} version"
      register: kubescape_current
      failed_when: false
      changed_when: false

    - name: "Extract installed version"
      set_fact:
        kubescape_current_version: "{{ kubescape_current.stdout | regex_search('([0-9]+\\.[0-9]+\\.[0-9]+)') }}"
      when: kubescape_current.rc == 0

    # Determine target version
    - name: "Get latest release from GitHub"
      uri:
        url: "https://api.github.com/repos/{{ kubescape_repo }}/releases/latest"
        return_content: yes
        headers:
          Accept: "application/vnd.github.v3+json"
      register: kubescape_release
      when: kubescape_version == "latest"

    - name: "Set target version (latest from GitHub)"
      set_fact:
        kubescape_target_version: "{{ kubescape_release.json.tag_name | regex_replace('^v', '') }}"
      when:
        - kubescape_version == "latest"
        - kubescape_release.json.tag_name is defined

    - name: "Set target version (pinned)"
      set_fact:
        kubescape_target_version: "{{ kubescape_version }}"
      when: kubescape_version != "latest"

    - name: "Fail if version could not be determined"
      fail:
        msg: "Could not determine kubescape version to install"
      when: kubescape_target_version is not defined

    # Determine if installation/update is needed
    - name: "Check if install or update is needed"
      set_fact:
        kubescape_needs_install: "{{ kubescape_current_version is not defined or kubescape_current_version != kubescape_target_version }}"

    - name: "Display installation status"
      debug:
        msg: >-
          kubescape
          {{ 'will be installed' if kubescape_current_version is not defined
             else ('will be updated from ' + kubescape_current_version + ' to ' + kubescape_target_version) if kubescape_needs_install
             else 'is already up to date (' + kubescape_current_version + ')' }}

    # Download and install
    - name: "Download kubescape binary"
      get_url:
        url: "https://github.com/{{ kubescape_repo }}/releases/download/v{{ kubescape_target_version }}/kubescape_{{ kubescape_target_version }}_linux_amd64"
        dest: "/tmp/kubescape"
        mode: "0755"
      when: kubescape_needs_install | bool

    - name: "Install kubescape binary"
      copy:
        src: "/tmp/kubescape"
        dest: "{{ kubescape_install_path }}"
        mode: "0755"
        remote_src: yes
      become: yes
      when: kubescape_needs_install | bool

    - name: "Verify installation"
      command: "{{ kubescape_install_path }} version"
      register: kubescape_verify
      changed_when: false
      when: kubescape_needs_install | bool

    - name: "Display installed version"
      debug:
        msg: "kubescape {{ kubescape_target_version }} installed successfully"
      when: kubescape_needs_install | bool

  always:
    # Cleanup temporary files
    - name: "Clean up temporary files"
      file:
        path: "/tmp/kubescape"
        state: absent
      when: kubescape_needs_install is defined and kubescape_needs_install | bool
