---
- block:
    - name: Install unattended-upgrades
      ansible.builtin.apt:
        name: unattended-upgrades
        state: present
        update_cache: yes

    - name: Unmask apt-daily-upgrade.service
      ansible.builtin.systemd:
        name: apt-daily-upgrade.service
        masked: no

    - name: Copy apt configs
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "/etc/apt/apt.conf.d/{{ item }}"
        owner: root
        group: root
        mode: '0644'
      loop:
        - 21auto-upgrades-autoclean
        - 51unattended-upgrades-override
        - 52unattended-upgrades-reboot

    - name: Ensure systemd override directory exists
      ansible.builtin.file:
        path: /etc/systemd/system/apt-daily-upgrade.timer.d
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Copy apt-daily-upgrade.timer override
      ansible.builtin.copy:
        src: override.conf
        dest: /etc/systemd/system/apt-daily-upgrade.timer.d/override.conf
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reload systemd
        - Reset failed state (if any)
        - Ensure timer is active
  tags: ['unattended-upgrade-override']
