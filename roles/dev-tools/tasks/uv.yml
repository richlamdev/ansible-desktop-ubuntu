---
- name: check if uv is installed
  command: "{{ home_dir }}/.local/bin/uv --version"
  register: _uv_installed
  failed_when: false
  changed_when: false
  become: false

- name: download uv installer
  get_url:
    url: https://astral.sh/uv/install.sh
    dest: /tmp/uv-install.sh
    mode: '0755'
  when: _uv_installed.rc != 0
  become: false

- name: install uv
  command: /tmp/uv-install.sh
  when: _uv_installed.rc != 0
  become: false

- name: update uv to latest
  command: "{{ home_dir }}/.local/bin/uv self update"
  register: _uv_update
  changed_when: "'Updated' in _uv_update.stdout"
  when: _uv_installed.rc == 0
  become: false

- name: define uv tool packages
  set_fact:
    uv_packages:
      - bandit
      - black
      - cfn-lint
      - coverage
      - flake8
      - mypy
      - pre-commit
      - pytest
      - ruff
      - yamlfmt
      - yamllint

- name: uv tool packages to manage
  debug:
    msg: "{{ uv_packages }}"

- name: check installed uv tools
  command: "{{ home_dir }}/.local/bin/uv tool list"
  register: _uv_tools
  changed_when: false
  become: false

- name: install uv tools
  command: "{{ home_dir }}/.local/bin/uv tool install {{ item }}"
  loop: "{{ uv_packages }}"
  when: item not in _uv_tools.stdout
  become: false

- name: upgrade all uv tools
  command: "{{ home_dir }}/.local/bin/uv tool upgrade --all"
  register: _uv_upgrade_all
  changed_when: "'Nothing to upgrade' not in _uv_upgrade_all.stderr"
  become: false
